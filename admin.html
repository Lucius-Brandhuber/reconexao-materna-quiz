<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Reconexão Materna</title>
<style>
  :root{
    --primary:#c0693f; --primary-d:#9a4f2c; --accent:#2cbf52; --accent-d:#1f9b40;
    --bg:#f4f1ee; --ink:#2a2018; --muted:#7a6a5f; --line:#eae2da; --card:#fff;
    --danger:#ef4444; --warn:#f5a623; --ok:#16a34a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:#cfd6e0;border-radius:99px}

  /* ===== LOGIN GATE ===== */
  #gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--primary) 0%,#a87c8e 100%);z-index:1000;padding:20px}
  .gate-card{background:#fff;width:360px;max-width:100%;border-radius:20px;padding:34px 28px;text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .gate-logo{font-size:42px;margin-bottom:10px}
  .gate-card h1{font-size:20px;margin-bottom:4px}
  .gate-card p{font-size:13px;color:var(--muted);margin-bottom:22px}
  .gate-card input{width:100%;padding:13px 14px;border:2px solid var(--line);border-radius:12px;font-size:15px;outline:none;transition:border-color .15s;margin-bottom:12px}
  .gate-card input:focus{border-color:var(--primary)}
  .gate-card button{width:100%;padding:13px;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;
    background:linear-gradient(135deg,var(--primary),var(--primary-d))}
  .gate-err{color:var(--danger);font-size:13px;margin-top:10px;min-height:18px}

  /* ===== TOPBAR ===== */
  #dash{display:none}
  .topbar{position:sticky;top:0;z-index:50;height:60px;background:#fff;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;padding:0 18px}
  .tb-logo{font-size:17px;font-weight:800;white-space:nowrap}
  .tb-logo .p{color:var(--primary)}
  .spacer{flex:1}
  .capi-pill{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:99px;border:1px solid var(--line)}
  .capi-dot{width:9px;height:9px;border-radius:50%;background:#9ca3af;animation:pulse 1.4s infinite}
  .capi-pill.ok{background:#eafaef;color:var(--accent-d);border-color:#bfe6c8}
  .capi-pill.ok .capi-dot{background:var(--accent)}
  .capi-pill.bad{background:#fdecec;color:var(--danger);border-color:#f6c5c5}
  .capi-pill.bad .capi-dot{background:var(--danger)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .sync-txt{font-size:12px;color:var(--muted);white-space:nowrap}
  .btn-refresh{font-size:13px;font-weight:600;padding:7px 13px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink)}
  .btn-refresh:hover{border-color:var(--primary);color:var(--primary)}
  .btn-exit{font-size:13px;font-weight:600;padding:7px 11px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--muted)}
  .btn-exit:hover{border-color:var(--danger);color:var(--danger)}

  .wrap{max-width:1240px;margin:0 auto;padding:18px}

  /* ===== PERIOD FILTER (global) ===== */
  .periodbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:16px}
  .periodbar label{font-size:13px;font-weight:600;color:var(--muted)}
  .pf-btn{font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink)}
  .pf-btn.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .periodbar input[type=date]{padding:7px 9px;border:1px solid var(--line);border-radius:9px;font-size:12.5px;outline:none}
  .periodbar input[type=date]:focus{border-color:var(--primary)}
  .pf-info{margin-left:auto;font-size:12.5px;color:var(--muted)}
  #customRange{display:none;align-items:center;gap:6px}
  #customRange.show{display:flex}

  /* ===== KPIs ===== */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;transition:transform .15s,box-shadow .15s}
  .kpi:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.07)}
  .kpi .ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:12px}
  .kpi .num{font-size:24px;font-weight:900;line-height:1}
  .kpi .lbl{font-size:10.5px;font-weight:700;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;margin-top:6px}
  .kpi .sub{font-size:11.5px;color:var(--muted);margin-top:3px}
  .delta{font-size:11px;font-weight:800;padding:2px 7px;border-radius:99px;margin-left:6px;vertical-align:middle}
  .delta.up{background:#eafaef;color:var(--accent-d)}
  .delta.dn{background:#fdecec;color:var(--danger)}
  .delta.eq{background:#f1f3f6;color:var(--muted)}

  /* ===== CARD ===== */
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px}
  .card h2{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .card h2 .badge{font-size:11px;font-weight:700;color:var(--primary);background:#fdeef5;border-radius:99px;padding:3px 10px}

  /* ===== FUNNEL MINI ===== */
  .funnel-mini{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding-bottom:8px}
  .fm-step{flex:0 0 auto;min-width:118px;text-align:center}
  .fm-bar-wrap{height:80px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:8px}
  .fm-bar{width:46px;border-radius:8px 8px 4px 4px;background:linear-gradient(180deg,var(--primary),var(--primary-d));min-height:6px;transition:height .4s}
  .fm-val{font-size:18px;font-weight:800}
  .fm-name{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.2}
  .fm-pct{font-size:11px;font-weight:700;margin-top:3px}
  .fm-pct.up{color:var(--accent-d)} .fm-pct.dn{color:var(--danger)}
  .fm-arrow{flex:0 0 auto;display:flex;align-items:center;color:#cbd2dc;font-size:18px;padding:0 2px;align-self:center}

  /* ===== TABS ===== */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tab{font-size:13px;font-weight:600;padding:9px 15px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--muted)}
  .tab.on{background:#fff;color:var(--ink);box-shadow:0 4px 14px rgba(0,0,0,.08);border-color:#fff}

  /* ===== TABLE ===== */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  table{border-collapse:collapse;width:100%;font-size:12.5px;min-width:680px}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{background:#f8fafc;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);position:sticky;top:0}
  td.fix,th.fix{position:sticky;left:0;background:#fff;z-index:2}
  th.fix{background:#f8fafc}
  tbody tr:hover td{background:#fafbfd}
  tbody tr:hover td.fix{background:#fafbfd}
  tbody tr.expandable{cursor:pointer}
  tr.payload-row td{background:#0f172a!important;padding:0}
  tr.payload-row pre{color:#a5f3b4;font-size:11px;line-height:1.5;padding:12px 16px;max-height:260px;overflow:auto;white-space:pre-wrap;word-break:break-all;font-family:ui-monospace,Menlo,monospace}
  .avatar{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;background:var(--primary);margin-right:8px;vertical-align:middle}
  .badge-ev{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px}
  .badge-ev.view{background:#eef2ff;color:#4f6bed}
  .badge-ev.answer{background:#eafaef;color:var(--accent-d)}
  .badge-ev.checkout{background:#fdeef5;color:var(--primary)}
  .badge-ev.click{background:#fff4e6;color:#d97706}
  .badge-ev.other{background:#f1f3f6;color:var(--muted)}
  .badge-st{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px}
  .badge-st.ap{background:#eafaef;color:var(--accent-d)}
  .badge-st.pe{background:#fff4e6;color:#d97706}
  .badge-st.re{background:#fdecec;color:var(--danger)}
  .badge-st.rf{background:#f3e8ff;color:#7c3aed}
  .badge-st.ou{background:#f1f3f6;color:var(--muted)}

  /* bar groups */
  .barGroup{display:flex;flex-direction:column;gap:9px}
  .bg-row{display:grid;grid-template-columns:130px 1fr 46px;gap:10px;align-items:center;font-size:12.5px}
  .bg-name{color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bg-track{height:9px;background:#eef1f5;border-radius:99px;overflow:hidden}
  .bg-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--primary),var(--accent))}
  .bg-val{font-size:12px;font-weight:700;text-align:right;color:var(--muted)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .mini-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .mini-kpi{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px}
  .mini-kpi .n{font-size:20px;font-weight:800}
  .mini-kpi .l{font-size:11px;color:var(--muted);margin-top:3px}

  .pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:12px;font-size:12.5px;color:var(--muted)}
  .pager button{padding:6px 11px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .row-actions{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .btn-soft{font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink)}
  .btn-soft:hover{border-color:var(--primary);color:var(--primary)}
  .btn-danger{font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:9px;border:1px solid #f6c5c5;background:#fff;color:var(--danger)}
  .btn-danger:hover{background:var(--danger);color:#fff}
  .flt{font-size:12.5px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;outline:none;background:#fff}
  .flt:focus{border-color:var(--primary)}
  .chip{font-size:12px;font-weight:600;padding:7px 12px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--muted)}
  .chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .journey-banner{display:flex;align-items:center;gap:10px;background:#fdeef5;border:1px solid #f2b7d5;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:12px}
  .journey-banner b{color:var(--primary-d)}

  .empty{padding:30px;text-align:center;color:var(--muted);font-size:13px}
  .note{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5}

  /* ===== RIVER FUNNEL (análise de conversão) ===== */
  .river-wrap{overflow-x:auto;background:#f8fafc;border:1px solid var(--line);border-radius:14px;position:relative}
  .river-inner{position:relative;width:max-content}
  .river-inner svg{display:block}
  .rv-col{fill:transparent;cursor:pointer}
  .rv-col:hover{fill:rgba(91,155,246,.07)}
  .river-tip{position:absolute;top:12px;z-index:6;background:#fff;border-radius:14px;box-shadow:0 14px 34px rgba(15,23,42,.16);
    padding:14px 16px;min-width:240px;max-width:300px;pointer-events:none;display:none;font-size:12.5px}
  .river-tip .rt-nums{display:flex;gap:22px;margin-bottom:4px}
  .river-tip .rt-nums .l{font-size:11.5px;color:var(--muted)}
  .river-tip .rt-nums .n{font-size:17px;font-weight:800}
  .river-tip .rt-sec{display:flex;gap:22px;border-top:1px solid var(--line);margin-top:9px;padding-top:9px}
  .river-tip .rt-h{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
  .river-tip .rt-row{display:flex;justify-content:space-between;gap:12px;font-size:12px;margin-bottom:4px}
  .river-tip .rt-row b{font-weight:700}

  /* drill-down modal */
  #modal{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:300;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  #modal.show{display:flex}
  .modal-card{background:#fff;border-radius:16px;max-width:760px;width:100%;padding:20px}
  .modal-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .modal-head h3{font-size:15px;flex:1}
  .modal-close{border:none;background:#f1f3f6;border-radius:8px;width:30px;height:30px;font-size:15px}
  .sig{font-size:12px;font-weight:700;padding:6px 12px;border-radius:9px;display:inline-block;margin-top:10px}
  .sig.ok{background:#eafaef;color:var(--accent-d)}
  .sig.small{background:#fff4e6;color:#d97706}
  .sig.ns{background:#f1f3f6;color:var(--muted)}

  #toast{position:fixed;bottom:18px;right:18px;background:#1a1a2e;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;opacity:0;transform:translateY(10px);transition:.25s;z-index:400;pointer-events:none}
  #toast.show{opacity:1;transform:translateY(0)}
  .hidden{display:none!important}

  @media(max-width:880px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .grid2{grid-template-columns:1fr}
    .mini-kpis{grid-template-columns:repeat(2,1fr)}
    .sync-txt{display:none}
    .tb-logo{font-size:14px}
    .capi-pill .t{display:none}
  }
  @media(max-width:520px){
    .kpis{grid-template-columns:1fr 1fr}
    .wrap{padding:12px}
    .bg-row{grid-template-columns:96px 1fr 40px}
  }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">🌸</div>
    <h1>Reconexão Materna</h1>
    <p>Painel administrativo de analytics</p>
    <input type="password" id="pwd" placeholder="Senha de acesso" autocomplete="current-password">
    <button onclick="login()">Entrar</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dash">
  <div class="topbar">
    <div class="tb-logo"><span class="p">🌸 Reconexão</span> Materna</div>
    <div class="spacer"></div>
    <div class="capi-pill" id="capiPill"><span class="capi-dot"></span><span class="t" id="capiTxt">CAPI…</span></div>
    <div class="sync-txt" id="syncTxt">sincronizando…</div>
    <button class="btn-refresh" onclick="sync(true)">↻ Atualizar</button>
    <button class="btn-exit" onclick="logout()" title="Sair">⎋</button>
  </div>

  <div class="wrap">
    <!-- PERIOD FILTER (global — vale para todas as abas) -->
    <div class="periodbar">
      <label>📅 Período:</label>
      <button class="pf-btn" data-p="today">Hoje</button>
      <button class="pf-btn" data-p="yesterday">Ontem</button>
      <button class="pf-btn" data-p="7d">7 dias</button>
      <button class="pf-btn" data-p="30d">30 dias</button>
      <button class="pf-btn on" data-p="all">Tudo</button>
      <button class="pf-btn" data-p="custom">Personalizado</button>
      <span id="customRange">
        <input type="date" id="pfFrom"> <span style="font-size:12px;color:var(--muted)">até</span> <input type="date" id="pfTo">
        <button class="pf-btn" onclick="applyCustom()">OK</button>
      </span>
      <span class="pf-info" id="pfInfo"></span>
    </div>

    <!-- KPIs -->
    <div class="kpis" id="kpis"></div>

    <!-- FUNNEL CARD -->
    <div class="card">
      <h2>🫧 Funil de Conversão <span class="badge" id="funnelConv">—</span></h2>
      <div class="funnel-mini" id="funnelMini"></div>
      <div id="areaChart" style="margin-top:14px"></div>
    </div>

    <!-- TABS -->
    <div class="tabs" id="tabs">
      <button class="tab on" data-tab="funil"><span class="em">📊</span> Funil</button>
      <button class="tab" data-tab="quiz"><span class="em">🧩</span> Quiz</button>
      <button class="tab" data-tab="eventos"><span class="em">📋</span> Eventos</button>
      <button class="tab" data-tab="resumo"><span class="em">📈</span> Resumo</button>
      <button class="tab" data-tab="trafego"><span class="em">🎯</span> Tráfego</button>
      <button class="tab" data-tab="vendas"><span class="em">💰</span> Vendas</button>
      <button class="tab" data-tab="horarios"><span class="em">🕐</span> Horários</button>
      <button class="tab" data-tab="capi"><span class="em">⚡</span> Meta CAPI</button>
    </div>

    <div id="tabContent"></div>
  </div>
</div>

<!-- drill-down -->
<div id="modal"><div class="modal-card">
  <div class="modal-head"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div id="modalBody"></div>
</div></div>

<div id="toast"></div>

<script>
/* ====================== CONFIG ====================== */
// Senha: hash SHA-256 de 'cmm-admin|<senha>'. Para trocar, rode no console:
//   sha256hex('cmm-admin|SUA_NOVA_SENHA').then(console.log)  e cole o hash aqui.
const PWD_HASH = '419ef8aebd6c963e6143a7e645caf4378ce057ce30dc512403d16bb40a69d80b';
const SESSION_HOURS = 12;                   // sessão expira em 12h
const PFX   = 'rm';
const KEY   = PFX+'_ev';                    // backup local de eventos
const CKEY  = PFX+'_admin_cache';           // cache do painel
const PERIODK = PFX+'_period';
const SESSK = PFX+'_admin_sess';
// >>> COLE AQUI a mesma URL /exec do Web App do Apps Script (ver gas/README.md)
const GAS   = 'COLE_AQUI_A_URL_DO_GAS';

const QUIZ_TOTAL = 17;       // telas de pergunta do quiz (step 0..16)
const QUIZ_LAST  = '16';     // step da última pergunta (= quiz concluído)
const PRICE = 29.90;         // preço do ebook (BRL) — fallback de valor
const CURRENCY = 'BRL';
const PRODUTOS = { ebook:'Reconexão Materna — As 3 Camadas' };
// Valor real da venda: usa o valor do postback do checkout quando vem preenchido;
// senão cai no preço conhecido do ebook.
function vValor(v){
  if(v && v.valor>0) return v.valor;
  return PRICE;
}

/* ====================== STATE ====================== */
let _evAll = [], _vendasAll = [], _capiLogAll = [];
let _ev = [], _vendas = [], _capiLog = [];         // período atual
let _evPrev = [], _vendasPrev = [];                 // período anterior equivalente
let period = { mode:'all', from:null, to:null };    // filtro global
let activeTab = 'funil';
let evPage = 1; const EV_PER = 25;
let evQuery = '', evType = '', evCamp = '', evSession = '';
let vStatus = 'all', vProd = 'all';

/* ====================== HELPERS ====================== */
const $  = s => document.querySelector(s);
const fmt = n => (n||0).toLocaleString('pt-BR');
const fmtMoney = n => (n||0).toLocaleString('pt-BR',{style:'currency',currency:CURRENCY});
const pct = (a,b) => b>0 ? Math.round(a/b*100) : 0;
const pct1 = (a,b) => b>0 ? (a/b*100).toFixed(1).replace('.',',') : '0';
const isTest = s => /^teste/i.test(String(s||''));
const APPROVED = /finaliz|aprovad|paid|pago|approved|confirmed/i;
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function sha256hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

function toMs(v){
  if(v==null||v==='') return 0;
  if(typeof v==='number') return v<2e10 ? v*1000 : v;
  const n = Number(v); if(!isNaN(n)) return n<2e10 ? n*1000 : n;
  const d = new Date(v); return isNaN(d)?0:d.getTime();
}
function dayKey(ms){
  if(!ms) return '';
  const d = new Date(ms);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function startOfDay(ms){ const d=new Date(ms); d.setHours(0,0,0,0); return d.getTime(); }

/* ---- normalização ---- */
function parseQS(url){
  const o={}; if(!url) return o;
  try{ const q=String(url).split('?')[1]||''; q.split('&').forEach(p=>{const[k,v]=p.split('=');if(k)o[decodeURIComponent(k)]=decodeURIComponent((v||'').replace(/\+/g,' '));}); }catch(e){}
  return o;
}
function deviceFrom(ua){
  ua=String(ua||'');
  if(/mobile|iphone|android.*mobile/i.test(ua)) return 'Mobile';
  if(/ipad|tablet/i.test(ua)) return 'Tablet';
  if(ua) return 'Desktop'; return '—';
}
function browserFrom(ua){
  ua=String(ua||'');
  if(/edg/i.test(ua))return'Edge'; if(/chrome|crios/i.test(ua))return'Chrome';
  if(/firefox|fxios/i.test(ua))return'Firefox'; if(/safari/i.test(ua))return'Safari';
  if(/instagram/i.test(ua))return'Instagram'; if(/fban|fbav/i.test(ua))return'Facebook';
  return ua?'Outro':'—';
}
function osFrom(ua){
  ua=String(ua||'');
  if(/iphone|ipad|ios/i.test(ua))return'iOS'; if(/android/i.test(ua))return'Android';
  if(/windows/i.test(ua))return'Windows'; if(/mac os|macintosh/i.test(ua))return'macOS';
  if(/linux/i.test(ua))return'Linux'; return ua?'Outro':'—';
}
function norm(r){
  const g=(...k)=>{for(const x of k){if(r[x]!=null&&r[x]!=='')return r[x];}return '';};
  const url=g('url','URL'); const ua=g('ua','UA','user_agent');
  const qs=parseQS(url);
  return {
    t:toMs(g('data','t','date','timestamp')),
    ev:String(g('evento','ev','event')||'').toLowerCase(),
    s:String(g('session','s','sid')||''),
    step:g('step','etapa'),
    name:g('nome','name'),
    gender:g('genero','gender'),
    ans:g('resposta','ans','answer'),
    ms:Number(g('ms'))||0,
    ref:g('referrer','ref'),
    ua, url,
    event_id:g('event_id','eventId'),
    fbp:g('fbp'), fbc:g('fbc'),
    logo_ab:g('logo_ab'),
    price_ab:String(g('price_ab')||''),
    utm_source:qs.utm_source||'', utm_medium:qs.utm_medium||'', utm_campaign:qs.utm_campaign||'',
    utm_content:qs.utm_content||'', utm_adset:qs.utm_adset||'',
    device:deviceFrom(ua), browser:browserFrom(ua), os:osFrom(ua)
  };
}
function normVenda(r){
  const g=(...k)=>{for(const x of k){if(r[x]!=null&&r[x]!=='')return r[x];}return '';};
  return {
    t:toMs(g('data','t')), status:String(g('status')||''), metodo:String(g('metodo','method','pagamento')||''),
    valor:(function(v){if(typeof v==='number')return v;v=String(v).replace(/[^\d.,-]/g,'');if(v.indexOf(',')>-1)v=v.replace(/\./g,'').replace(',','.');return Number(v)||0;})(g('valor','value','amount')),
    nome:g('nome','name'), email:g('email'), telefone:g('telefone','phone'),
    order_id:g('order_id','orderId','id'), raw:g('raw'),
    ab:String(g('ab')||''),
    produto:String(g('produto')||'')   // vazio = venda antiga (antes da coluna)
  };
}
function normCapi(r){
  const g=(...k)=>{for(const x of k){if(r[x]!=null&&r[x]!=='')return r[x];}return '';};
  return { t:toMs(g('data','t')), ev:g('evento','ev'), event_id:g('event_id'), s:g('s','session'),
    status_code:Number(g('status_code','status'))||0, response:String(g('response','resp')||'') };
}
/* status da venda → classe */
function vendaStatus(v){
  const s = String(v.status||'');
  if(/reembols|refund|estorn|chargeback/i.test(s)) return 'reembolsada';
  if(APPROVED.test(s)) return 'aprovada';
  if(/recus|refus|negad|declin|cancel/i.test(s)) return 'recusada';
  if(/pendent|aguard|waiting|gerad|criad|process|expir/i.test(s)) return 'pendente';
  return 'outro';
}

/* ---- contagem (parametrizada p/ período atual e anterior) ---- */
function liveIn(arr){ return arr.filter(e=>!isTest(e.s)); }
function liveEv(){ return liveIn(_ev); }
function uSetIn(arr,pred){ const s=new Set(); liveIn(arr).forEach(e=>{if(pred(e)&&e.s)s.add(e.s);}); return s.size; }
function uSet(pred){ return uSetIn(_ev,pred); }
const uViews  = step => uSet(e=>e.ev==='view'&&String(e.step)===String(step));
const uClicks = step => uSet(e=>e.ev==='click'&&String(e.step)===String(step));
const uAnswers= step => uSet(e=>e.ev==='answer'&&String(e.step)===String(step));

function metricsFor(evArr, vendasArr){
  const visitors = uSetIn(evArr, e=>e.ev==='view'&&String(e.step)==='0');
  const leads    = uSetIn(evArr, e=>e.ev==='answer'&&String(e.step)==='1');
  const quizDone = uSetIn(evArr, e=>e.ev==='answer'&&String(e.step)===QUIZ_LAST);
  const salesV   = uSetIn(evArr, e=>e.ev==='view'&&String(e.step)==='pv');
  const checkout = uSetIn(evArr, e=>e.ev==='checkout_click');
  const approved = vendasArr.filter(v=>APPROVED.test(v.status));
  const purchases= approved.length;
  const revenue  = approved.reduce((a,v)=>a+vValor(v),0);
  const ticket   = purchases>0 ? revenue/purchases : 0;
  return {visitors,leads,quizDone,salesV,checkout,purchases,revenue,ticket};
}
function metrics(){ return metricsFor(_ev,_vendas); }
function metricsPrev(){ return metricsFor(_evPrev,_vendasPrev); }

/* Auto-atualização em segundo plano — mantém o painel vivo sem clicar em "Atualizar".
   Usa sync(false) (cache-friendly no GAS), pausa quando a aba está oculta e
   dispara na hora ao voltar pra aba. */
let _autoTimer=null, _visBound=false;
const AUTO_MS=15000;
function startAutoSync(){
  if(_autoTimer) clearInterval(_autoTimer);
  _autoTimer = setInterval(()=>{ if(!document.hidden) sync(false); }, AUTO_MS);
  if(!_visBound){
    _visBound=true;
    document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) sync(false); });
  }
}

function localBackup(){
  try{ return (JSON.parse(localStorage.getItem(KEY)||'[]')||[]).map(norm); }catch(e){ return []; }
}
function mergeNoDup(base, extra){
  const seen = new Set(base.map(e=>e.s+'|'+e.ev+'|'+e.step+'|'+e.t));
  const out = base.slice();
  extra.forEach(e=>{ const k=e.s+'|'+e.ev+'|'+e.step+'|'+e.t; if(!seen.has(k)){seen.add(k);out.push(e);} });
  return out;
}
function mergeVendas(base, extra){
  const key=v=>v.order_id+'|'+v.status+'|'+v.t;
  const seen=new Set(base.map(key)); const out=base.slice();
  extra.forEach(v=>{ const k=key(v); if(!seen.has(k)){seen.add(k);out.push(v);} });
  return out;
}
function mergeCapi(base, extra){
  const key=c=>c.event_id+'|'+c.ev+'|'+c.t+'|'+c.status_code;
  const seen=new Set(base.map(key)); const out=base.slice();
  extra.forEach(c=>{ const k=key(c); if(!seen.has(k)){seen.add(k);out.push(c);} });
  return out;
}
// maior timestamp que já temos localmente → ponto de partida do delta sync
function sinceTs(){
  let m=0;
  [_evAll,_vendasAll,_capiLogAll].forEach(a=>a.forEach(x=>{ if(x.t>m) m=x.t; }));
  return m;
}
function extract(j){ if(Array.isArray(j))return j; if(!j)return[]; return j.data||j.rows||j.eventos||j.vendas||j.items||[]; }

let _syncing=false;
async function sync(manual){
  if(_syncing) return;
  _syncing=true;
  const t0=Date.now();
  if(manual) toast('Atualizando…');
  $('#syncTxt').textContent='sincronizando…';
  const ok = GAS && !/COLE_AQUI/.test(GAS);
  if(ok){
    try{
      // Delta: se já temos dados locais e não é refresh manual, pedimos só o novo.
      const since = manual ? 0 : sinceTs();
      const url = GAS+'?all=1'+(since>0 ? '&since='+since : (manual?'&fresh=1':''));
      const j = await fetch(url).then(r=>r.json());
      let evRaw, veRaw, caRaw, isDelta=false;
      if(j && !Array.isArray(j) && (j.eventos||j.vendas||j.capi_log||j.delta)){
        evRaw=j.eventos||[]; veRaw=j.vendas||[]; caRaw=j.capi_log||[]; isDelta=!!j.delta;
      }else{
        const [a,b,c] = await Promise.all([
          Array.isArray(j)?Promise.resolve(j):fetch(GAS).then(r=>r.json()).catch(()=>[]),
          fetch(GAS+'?sheet=vendas').then(r=>r.json()).catch(()=>[]),
          fetch(GAS+'?sheet=capi_log').then(r=>r.json()).catch(()=>[])
        ]);
        evRaw=extract(a); veRaw=extract(b); caRaw=extract(c);
      }
      const evN=evRaw.map(norm), veN=veRaw.map(normVenda), caN=caRaw.map(normCapi);
      if(isDelta){
        _evAll     = mergeNoDup(_evAll, evN);
        _vendasAll = mergeVendas(_vendasAll, veN);
        _capiLogAll= mergeCapi(_capiLogAll, caN);
      }else{
        _evAll     = mergeNoDup(evN, localBackup());
        _vendasAll = veN;
        _capiLogAll= caN;
      }
      localStorage.setItem(CKEY, JSON.stringify({ev:_evAll,vendas:_vendasAll,capi:_capiLogAll,ts:Date.now()}));
      $('#syncTxt').textContent='atualizado '+new Date().toLocaleTimeString('pt-BR')+(isDelta?(' · +'+evN.length):'')+' · '+((Date.now()-t0)/1000).toFixed(1)+'s';
    }catch(e){
      _evAll = mergeNoDup(_evAll, localBackup());
      $('#syncTxt').textContent='offline · usando cache';
    }
  }else{
    _evAll = mergeNoDup(_evAll, localBackup());
    $('#syncTxt').textContent='GAS não configurado';
  }
  _syncing=false;
  applyFilter(); renderAll();
  if(manual) toast('✓ '+fmt(_evAll.filter(e=>!isTest(e.s)).length)+' eventos · '+fmt(_vendasAll.length)+' vendas · '+fmt(_capiLogAll.length)+' CAPI');
}

/* ====================== PERIOD FILTER (global) ====================== */
function rangeMs(){
  const now = Date.now();
  const m = period.mode;
  if(m==='today')     return [startOfDay(now), now+1];
  if(m==='yesterday') { const t=startOfDay(now); return [t-864e5, t]; }
  if(m==='7d')        return [startOfDay(now-6*864e5), now+1];
  if(m==='30d')       return [startOfDay(now-29*864e5), now+1];
  if(m==='custom' && period.from) {
    const a=startOfDay(new Date(period.from+'T12:00:00').getTime());
    const b=period.to ? startOfDay(new Date(period.to+'T12:00:00').getTime())+864e5 : a+864e5;
    return [a,b];
  }
  return null; // tudo
}
function applyFilter(){
  const r = rangeMs();
  if(r){
    const [a,b]=r, len=b-a, pa=a-len, pb=a;
    _ev      = _evAll.filter(e=>e.t>=a&&e.t<b);
    _vendas  = _vendasAll.filter(v=>v.t>=a&&v.t<b);
    _capiLog = _capiLogAll.filter(c=>c.t>=a&&c.t<b);
    _evPrev     = _evAll.filter(e=>e.t>=pa&&e.t<pb);
    _vendasPrev = _vendasAll.filter(v=>v.t>=pa&&v.t<pb);
  }else{
    _ev=_evAll.slice(); _vendas=_vendasAll.slice(); _capiLog=_capiLogAll.slice();
    _evPrev=[]; _vendasPrev=[];
  }
}

  document.querySelectorAll('.pf-btn[data-p]').forEach(b=>b.onclick=()=>{
    const m=b.dataset.p;
    if(m==='custom'){ $('#customRange').classList.add('show'); return; }

    period={mode:m,from:null,to:null};

function deltaBadge(cur, prev){

  if(d>0)  return '<span class="delta up">▲ '+d+'%</span>';
  if(d<0)  return '<span class="delta dn">▼ '+Math.abs(d)+'%</span>';
  return '<span class="delta eq">=</span>';
}

/* SVG line/area chart genérico por dia */
function lineChart(events, label){
  if(events.length<2) return '<div class="empty" style="padding:14px">Sem dados suficientes para o gráfico.</div>';
  const buckets={};
  events.forEach(e=>{ if(e.t){ const k=dayKey(e.t); buckets[k]=(buckets[k]||0)+1; } });
  const keys=Object.keys(buckets).sort();
  if(keys.length<2) return '<div class="empty" style="padding:14px">Sem dados suficientes para o gráfico.</div>';
  const pts=keys.map(k=>buckets[k]);
  const W=1000,H=160,pad=8;
  const max=Math.max(...pts), dx=(W-pad*2)/Math.max(1,pts.length-1);
  const xy=pts.map((v,i)=>[pad+i*dx, H-pad-(v/max)*(H-pad*2)]);
  const line=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L ${(pad+(pts.length-1)*dx).toFixed(1)} ${H-pad} L ${pad} ${H-pad} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="160" preserveAspectRatio="none">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="var(--primary)" stop-opacity=".28"/>
      <stop offset="1" stop-color="var(--primary)" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#ag)"/>
    <path d="${line}" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linejoin="round"/>
  </svg>
  <div style="display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:4px">
    <span>${keys[0].split('-').reverse().slice(0,2).join('/')}</span>
    <span>${label} · pico ${max}</span>
    <span>${keys[keys.length-1].split('-').reverse().slice(0,2).join('/')}</span></div>`;
}

/* ====================== FUNIL (etapas clicáveis + drill-down) ====================== */
const FUNIL_STEPS = [
  {k:'Visitante (abriu o quiz)',       short:'Visitante',        tag:'view · step 0',        pred:e=>e.ev==='view'&&String(e.step)==='0'},
  {k:'Quiz · Pergunta 1 (Lead)',       short:'Lead (P1)',        tag:'answer · step 1',      pred:e=>e.ev==='answer'&&String(e.step)==='1'},
  {k:'Quiz · Pergunta 8 (meio)',       short:'Meio (P8)',        tag:'answer · step 8',      pred:e=>e.ev==='answer'&&String(e.step)==='8'},
  {k:'Quiz concluído (Pergunta 16)',   short:'Quiz fim',         tag:'answer · step 16',     pred:e=>e.ev==='answer'&&String(e.step)==='16'},
  {k:'Diagnóstico — viu o resultado',  short:'Diagnóstico',      tag:'view · diagnostico',   pred:e=>e.ev==='view'&&String(e.step)==='diagnostico', clicks:()=>uSet(e=>e.ev==='click'&&String(e.step)==='cta_pv')},
  {k:'Página de vendas — abriu',       short:'Página de vendas', tag:'view · pv',            pred:e=>e.ev==='view'&&String(e.step)==='pv', clicks:()=>uSet(e=>e.ev==='checkout_click')},
  {k:'Checkout — clicou em comprar',   short:'Checkout',         tag:'checkout_click',       pred:e=>e.ev==='checkout_click'}
];
function tabFunil(){
  const ap = _vendas.filter(v=>APPROVED.test(v.status)).length;
  const J = FUNIL_STEPS.map(st=>({...st, v:uSet(st.pred)}));
  J.push({k:'Compra aprovada', short:'Compra', tag:'venda · checkout', v:ap, noDrill:true});
  const river = riverFunnel(J);
  const max=Math.max(1,...J.map(d=>d.v));
  let rows='';
  J.forEach((d,i)=>{
    const prev=i>0?J[i-1].v:d.v; const keep=i>0?pct(d.v,prev):100; const drop=i>0?(prev-d.v):0;
    const dropPct=i>0?pct(drop,prev):0;
    const click = d.noDrill?'':`onclick="openDrill(${i})" title="Clique para ver as sessões desta etapa"`;

      </div>
      <div style="flex:1;min-width:110px"><div class="bg-track" style="height:13px"><div class="bg-fill" style="width:${d.v/max*100}%"></div></div></div>

      <div style="width:104px;text-align:right;font-size:11.5px;color:var(--danger)">${i===0?'':(drop>0?'<b>−'+dropPct+'%</b> <span style="color:var(--muted)">−'+fmt(drop)+'</span>':'<span style="color:var(--accent-d)">0%</span>')}</div>
    </div>`;
  });
  return `<div class="card"><h2>🌊 Análise de Conversão <span class="badge">passe o mouse · clique p/ ver as sessões</span></h2>${river}</div>
  <div class="card"><h2>📊 Jornada completa do funil <span class="badge">clique numa etapa p/ ver as sessões</span></h2>
    <div style="overflow-x:auto"><div style="min-width:700px">
    <div style="display:flex;gap:12px;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding-bottom:6px;border-bottom:1px solid var(--line)">

      <div style="width:60px;text-align:right">Sessões</div><div style="width:58px;text-align:right">Retém</div><div style="width:104px;text-align:right">Queda</div>
    </div>${rows}</div></div></div>`;
}
/* rio de conversão estilo analytics — afunila suave entre os passos */
let _river = [];
function riverFunnel(J){
  const n=J.length, W=210, RH=230, cy=125, LABELS=86, H=RH+LABELS, TOT=n*W;
  const maxV=Math.max(1,...J.map(d=>d.v));
  const hs=J.map(d=>Math.max(5, d.v/maxV*(RH-50)));
  const xm=i=>i*W+W*0.55;
  const top=i=>cy-hs[i]/2, bot=i=>cy+hs[i]/2;
  function path(pad){
    const t=i=>top(i)-pad, b=i=>bot(i)+pad;
    let d='M 0 '+t(0);
    for(let i=0;i<n;i++){
      d+=' L '+xm(i)+' '+t(i);
      if(i<n-1){ const c=xm(i)+(( (i+1)*W)-xm(i))*0.5;
        d+=' C '+c+' '+t(i)+', '+c+' '+t(i+1)+', '+((i+1)*W)+' '+t(i+1); }
      else d+=' L '+TOT+' '+t(i);
    }
    d+=' L '+TOT+' '+b(n-1)+' L '+xm(n-1)+' '+b(n-1);
    for(let i=n-2;i>=0;i--){
      d+=' L '+((i+1)*W)+' '+b(i+1);
      const c=xm(i)+(((i+1)*W)-xm(i))*0.5;
      d+=' C '+c+' '+b(i+1)+', '+c+' '+b(i)+', '+xm(i)+' '+b(i);
    }
    d+=' L 0 '+b(0)+' Z';
    return d;
  }
  // dados do tooltip por passo (origens e dispositivos das sessões do passo)
  const sidInfo={};
  liveEv().forEach(e=>{ if(!e.s)return; const o=sidInfo[e.s]=sidInfo[e.s]||{src:'',dev:''};
    if(!o.src&&e.utm_source)o.src=e.utm_source; if((!o.dev||o.dev==='—')&&e.device!=='—')o.dev=e.device; });
  _river=J.map((d,i)=>{
    const prev=i>0?J[i-1].v:d.v;
    const info={name:d.k, v:d.v, keep:i>0?pct(d.v,prev):100, drop:i>0?prev-d.v:0, dropPct:i>0?pct(prev-d.v,prev):0, clicks:d.clicks?d.clicks():null, noDrill:!!d.noDrill, src:[], dev:[]};
    if(!d.noDrill&&d.pred){
      const sids=new Set(); liveEv().forEach(e=>{ if(d.pred(e)&&e.s)sids.add(e.s); });
      const sc={}, dc={};
      sids.forEach(s=>{ const o=sidInfo[s]||{}; const k1=o.src||'direto', k2=o.dev||'—';
        sc[k1]=(sc[k1]||0)+1; dc[k2]=(dc[k2]||0)+1; });
      const tot=Math.max(1,sids.size);
      info.src=Object.entries(sc).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>[k,(v/tot*100).toFixed(1).replace('.',',')]);
      info.dev=Object.entries(dc).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>[k,(v/tot*100).toFixed(1).replace('.',',')]);
    }
    return info;
  });
  let seps='', cols='', labels='';
  for(let i=0;i<n;i++){
    if(i>0) seps+=`<line x1="${i*W}" y1="14" x2="${i*W}" y2="${RH-8}" stroke="#e5e9f0" stroke-width="1.5"/>`;
    labels+=`<text x="${i*W+W/2}" y="${RH+24}" text-anchor="middle" style="font-size:10px;font-weight:700;letter-spacing:1.2px;fill:#9aa3b2">PASSO ${i+1}</text>
      <text x="${i*W+W/2}" y="${RH+42}" text-anchor="middle" style="font-size:11px;fill:#6b7280">${esc(J[i].short||'')}</text>
      <text x="${i*W+W/2}" y="${RH+64}" text-anchor="middle"><tspan style="font-size:15px;font-weight:800;fill:#1a1a2e">${fmt(J[i].v)}</tspan><tspan style="font-size:11px;fill:#6b7280"> ${i===n-1?'compras':'sessões'}</tspan></text>`;
    cols+=`<rect class="rv-col" x="${i*W}" y="0" width="${W}" height="${H}" data-i="${i}"
      onmousemove="riverTip(event,${i})" onmouseleave="riverTipHide()" onclick="${J[i].noDrill?'':'openDrill('+i+')'}"/>`;
  }
  return `<div class="river-wrap"><div class="river-inner">
    <svg width="${TOT}" height="${H}" viewBox="0 0 ${TOT} ${H}">
      ${seps}
      <path d="${path(9)}" fill="#c3d9fb"/>
      <path d="${path(0)}" fill="#5b9bf6"/>
      ${labels}${cols}
    </svg>
    <div class="river-tip" id="riverTip"></div>
  </div></div>`;
}
function riverTip(evt,i){
  const d=_river[i]; const tip=$('#riverTip'); if(!d||!tip) return;
  let h=`<div style="font-size:12px;font-weight:700;margin-bottom:8px">${esc(d.name)}</div>
    <div class="rt-nums">
      <div><div class="l">${d.noDrill?'Compras':'Sessões'}</div><div class="n">${fmt(d.v)}</div></div>
      <div><div class="l">Retenção</div><div class="n" style="color:${d.keep>=50?'var(--accent-d)':'var(--danger)'}">${d.keep}%</div></div>
      ${d.drop>0?`<div><div class="l">Queda</div><div class="n" style="color:var(--danger)">−${d.dropPct}% <span style="font-size:11px;color:var(--muted)">(−${fmt(d.drop)})</span></div></div>`:''}
      ${d.clicks!=null?`<div><div class="l">Cliques</div><div class="n">${fmt(d.clicks)}</div></div>`:''}
    </div>`;
  if(d.src.length||d.dev.length){
    h+=`<div class="rt-sec">
      <div style="flex:1"><div class="rt-h">Top origens</div>${d.src.map(([k,p])=>`<div class="rt-row"><span>${esc(k)}</span><b>${p}%</b></div>`).join('')}</div>
      <div style="flex:1"><div class="rt-h">Dispositivos</div>${d.dev.map(([k,p])=>`<div class="rt-row"><span>${esc(k)}</span><b>${p}%</b></div>`).join('')}</div>
    </div>`;
  }
  if(d.noDrill) h+=`<div style="font-size:11px;color:var(--muted);margin-top:8px">Vendas via postback do checkout (sem sessão vinculada).</div>`;
  tip.innerHTML=h;
  tip.style.display='block';
  const W=210, wrap=tip.parentElement;
  const tw=tip.offsetWidth||260;
  let x=i*W+W/2-tw/2;
  x=Math.max(8, Math.min(x, wrap.scrollWidth-tw-8));
  tip.style.left=x+'px';
}
function riverTipHide(){ const t=$('#riverTip'); if(t) t.style.display='none'; }

function openDrill(idx){
  const st = FUNIL_STEPS[idx]; if(!st) return;
  const bySid = new Map();
  liveEv().forEach(e=>{
    if(!st.pred(e)||!e.s) return;
    if(!bySid.has(e.s)) bySid.set(e.s,{s:e.s,t:e.t,camp:'',src:'',dev:e.device});
  });
  // enriquece com utm/dispositivo de qualquer evento da sessão
  liveEv().forEach(e=>{
    const o=bySid.get(e.s); if(!o) return;
    if(!o.camp&&e.utm_campaign) o.camp=e.utm_campaign;
    if(!o.src&&e.utm_source) o.src=e.utm_source;
    if((!o.dev||o.dev==='—')&&e.device!=='—') o.dev=e.device;
  });
  const list=[...bySid.values()].sort((a,b)=>b.t-a.t);
  let rows=list.slice(0,300).map(o=>`<tr>
    <td><button class="btn-soft" style="padding:4px 9px;font-size:11px" onclick="openJourney('${esc(o.s)}')">🧭 jornada</button></td>
    <td>${esc((o.s||'').slice(0,14))}…</td>
    <td>${o.t?new Date(o.t).toLocaleString('pt-BR'):'—'}</td>
    <td>${esc(o.src||'direto')}</td>
    <td>${esc(o.camp||'—')}</td>
    <td>${esc(o.dev||'—')}</td></tr>`).join('');
  if(!list.length) rows='<tr><td colspan="6"><div class="empty">Nenhuma sessão nesta etapa no período.</div></td></tr>';
  $('#modalTitle').textContent = st.k+' · '+fmt(list.length)+' sessões';
  $('#modalBody').innerHTML = `<div class="tbl-wrap"><table style="min-width:600px">
    <thead><tr><th></th><th>Sessão</th><th>Quando</th><th>Origem</th><th>Campanha</th><th>Disp.</th></tr></thead>
    <tbody>${rows}</tbody></table></div>
    ${list.length>300?'<div class="note">Mostrando as 300 mais recentes de '+fmt(list.length)+'.</div>':''}`;
  $('#modal').classList.add('show');
}
function closeModal(){ $('#modal').classList.remove('show'); }

const QUIZ_QS = [
  {step:'1',  emoji:'⏰', q:'Para começarmos: há quanto tempo foi o parto?'},

const isDiagView  = e=>e.ev==='view' &&String(e.step)==='diagnostico';
const isDiagClick = e=>e.ev==='click'&&String(e.step)==='cta_pv';

function medianOf(a){ if(!a.length)return 0; const s=a.slice().sort((x,y)=>x-y), m=s.length>>1; return s.length%2?s[m]:(s[m-1]+s[m])/2; }
const fmtSec = ms=>{ const s=ms/1000; return s>=60 ? Math.floor(s/60)+'m'+String(Math.round(s%60)).padStart(2,'0')+'s' : String(Math.round(s*10)/10).replace('.',',')+'s'; };

function quizStatsIn(arr){
  return {
    vis:  uSetIn(arr,e=>e.ev==='view'&&String(e.step)==='0'),
    start:uSetIn(arr,e=>e.ev==='answer'&&String(e.step)==='1'),
    done: uSetIn(arr,e=>e.ev==='answer'&&String(e.step)===QUIZ_LAST),
    diag: uSetIn(arr,isDiagView),
    cta:  uSetIn(arr,isDiagClick),
    pv:   uSetIn(arr,e=>e.ev==='view'&&String(e.step)==='pv')
  };
}
/* distribuição de respostas (1 por sessão — a primeira) */
function quizDist(step){
  const seen=new Set(), out={};
  liveEv().filter(e=>e.ev==='answer'&&String(e.step)===String(step)).sort((a,b)=>a.t-b.t)
    .forEach(e=>{ if(!e.s||seen.has(e.s))return; seen.add(e.s); const k=String(e.ans||'—').trim()||'—'; out[k]=(out[k]||0)+1; });
  return out;
}
/* tempo mediano de resposta de um step (descarta <0,25s e >10min) */
function quizMs(step, ev){
  const v=liveEv().filter(e=>e.ev===(ev||'answer')&&String(e.step)===String(step)&&e.ms>250&&e.ms<600000).map(e=>e.ms);
  return {med:medianOf(v), n:v.length};
}
/* duração total do quiz por sessão (view P1 → answer P5) */
function quizDuration(){
  const t1={}, t5={};
  liveEv().forEach(e=>{
    if(!e.s||!e.t)return;
    if(e.ev==='answer'&&String(e.step)==='1'&&(!t1[e.s]||e.t<t1[e.s])) t1[e.s]=e.t;
    if(e.ev==='answer'&&String(e.step)===QUIZ_LAST&&(!t5[e.s]||e.t<t5[e.s])) t5[e.s]=e.t;
  });
  const d=[]; Object.keys(t5).forEach(s=>{ if(t1[s]){ const x=t5[s]-t1[s]; if(x>5000&&x<1800000)d.push(x); } });
  return {med:medianOf(d), n:d.length};
}
function ansBars(dist){
  const ent=Object.entries(dist).sort((a,b)=>b[1]-a[1]);
  if(!ent.length) return '<div class="empty">Sem respostas no período.</div>';
  const tot=ent.reduce((a,e)=>a+e[1],0)||1, max=Math.max(1,...ent.map(e=>e[1]));
  return ent.map(([k,v])=>`<div style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;gap:12px;font-size:12.5px;line-height:1.35;margin-bottom:4px">
      <span style="flex:1">${esc(k)}</span><b style="white-space:nowrap">${fmt(v)} · ${(v/tot*100).toFixed(1).replace('.',',')}%</b></div>
    <div class="bg-track"><div class="bg-fill" style="width:${(v/max*100).toFixed(1)}%"></div></div>
  </div>`).join('');
}
function tabQuiz(){
  const S=quizStatsIn(_ev), P=quizStatsIn(_evPrev);
  const startRate=pct(S.start,S.vis), startRateP=pct(P.start,P.vis);
  const doneRate=pct(S.done,S.start), doneRateP=pct(P.done,P.start);
  const dur=quizDuration();

  const kpis =
    kpi('👁️','#4A7AF5',fmt(S.vis),'Visitantes','abriram o quiz',deltaBadge(S.vis,P.vis))+
    kpi('🚀','#c0693f',startRate+'%','Taxa de início',fmt(S.start)+' responderam a P1',deltaBadge(startRate,startRateP))+
    kpi('🏁','#a855f7',doneRate+'%','Conclusão',fmt(S.done)+' responderam a P16 · % de quem começou',deltaBadge(doneRate,doneRateP))+
    kpi('🩺','#f5a623',fmt(S.diag),'Viram o diagnóstico',pct(S.diag,S.done)+'% de quem concluiu',deltaBadge(S.diag,P.diag))+
    kpi('👉','#2cbf52',fmt(S.cta),'Clicaram "ver solução"',S.diag?pct(S.cta,S.diag)+'% do diagnóstico':'—',deltaBadge(S.cta,P.cta))+
    kpi('⏱️','#16a34a',dur.n?fmtSec(dur.med):'—','Tempo do quiz','mediana P1→P16 · n='+fmt(dur.n),'');

  /* ---- escada de retenção ---- */
  const base=Math.max(1,S.vis);
  const lr=[{emoji:'🏠', label:'Abriu o quiz (visitante)', saw:S.vis, adv:S.start, keep:null}];
  let prevAns=S.vis;
  QUIZ_QS.forEach(q=>{
    const saw=uViews(q.step), ans=uAnswers(q.step);
    lr.push({emoji:q.emoji, label:'Pergunta '+q.step+' — '+q.q, saw, adv:ans, keep:pct(ans,prevAns)});
    prevAns=ans;
  });
  lr.push({emoji:'🩺', label:'Diagnóstico — viu o resultado · avançou = clicou no CTA', saw:S.diag, adv:S.cta, keep:pct(S.diag,prevAns)});
  lr.push({emoji:'🛍️', label:'Página de vendas — abriu', saw:S.pv, adv:null, keep:pct(S.pv,S.diag)});
  const ladderHead=`<div style="display:flex;gap:12px;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding-bottom:6px;border-bottom:1px solid var(--line)">
    <div style="width:280px;min-width:230px">Etapa</div><div style="flex:1;min-width:100px">Alcance</div>
    <div style="width:64px;text-align:right">Viram</div><div style="width:82px;text-align:right">Avançaram</div>
    <div style="width:58px;text-align:right">Taxa</div><div style="width:66px;text-align:right">Retenção</div></div>`;
  const ladderRows=lr.map(r=>{
    const rate=r.adv!=null?pct(r.adv,r.saw):null;
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)">
      <div style="width:280px;min-width:230px;font-size:12.5px;font-weight:600;line-height:1.35">${r.emoji} ${esc(r.label)}</div>
      <div style="flex:1;min-width:100px"><div class="bg-track" style="height:13px"><div class="bg-fill" style="width:${(r.saw/base*100).toFixed(1)}%"></div></div></div>
      <div style="width:64px;text-align:right;font-weight:800">${fmt(r.saw)}</div>
      <div style="width:82px;text-align:right">${r.adv!=null?fmt(r.adv):'—'}</div>
      <div style="width:58px;text-align:right;font-weight:700;color:${rate==null?'var(--muted)':rate>=70?'var(--accent-d)':rate>=40?'#d97706':'var(--danger)'}">${rate!=null?rate+'%':'—'}</div>
      <div style="width:66px;text-align:right;font-size:12px;color:var(--muted)">${r.keep!=null?r.keep+'%':'—'}</div>
    </div>`;
  }).join('');

  /* ---- início/conclusão por dia (últimos 14 dias do período) ---- */
  const days={};
  liveEv().forEach(e=>{
    if(!e.t||!e.s)return;
    const k=dayKey(e.t); const d=days[k]=days[k]||{vis:new Set(),st:new Set(),dn:new Set()};
    if(e.ev==='view'&&String(e.step)==='0')d.vis.add(e.s);
    else if(e.ev==='answer'&&String(e.step)==='1')d.st.add(e.s);
    else if(e.ev==='answer'&&String(e.step)===QUIZ_LAST)d.dn.add(e.s);
  });
  const dk=Object.keys(days).sort().slice(-14);
  const dayRows=dk.slice().reverse().map(k=>{
    const d=days[k], sr=pct(d.st.size,d.vis.size);
    return `<tr><td>${k.split('-').reverse().slice(0,2).join('/')}</td>
      <td style="text-align:right">${fmt(d.vis.size)}</td>

      <td style="text-align:right;font-weight:700">${pct(d.dn.size,d.st.size)}%</td></tr>`;
  }).join('') || '<tr><td colspan="6"><div class="empty">Sem dados no período.</div></td></tr>';
  let chart='';
  if(dk.length>=2){
    const rates=dk.map(k=>pct(days[k].st.size,days[k].vis.size));
    const W=1000,H=120,pad=10, dx=(W-2*pad)/(dk.length-1);
    const y=v=>H-pad-(v/100)*(H-2*pad);
    const line=rates.map((v,i)=>(i?'L':'M')+(pad+i*dx).toFixed(1)+' '+y(v).toFixed(1)).join(' ');
    const dots=rates.map((v,i)=>`<circle cx="${(pad+i*dx).toFixed(1)}" cy="${y(v).toFixed(1)}" r="3.5" fill="var(--primary)"><title>${dk[i].split('-').reverse().slice(0,2).join('/')} · ${v}%</title></circle>`).join('');
    chart=`<svg viewBox="0 0 ${W} ${H}" width="100%" height="120" preserveAspectRatio="none" style="margin-top:10px">

  }

  /* ---- tempo mediano por etapa ---- */
  const timeRows=QUIZ_QS.map(q=>[q.emoji+' Pergunta '+q.step+' — tempo pra responder',quizMs(q.step)])

  const sdev={};

  const dvm={};

    if(!e.s)return; const dv=sdev[e.s]||'—';

    if(e.ev==='view'&&String(e.step)==='0')o.vis.add(e.s);
    else if(e.ev==='answer'&&String(e.step)==='1')o.st.add(e.s);

    <td>${esc(k)}</td><td style="text-align:right">${fmt(o.vis.size)}</td>

    || '<tr><td colspan="6"><div class="empty">Sem dados no período.</div></td></tr>';

  /* ---- cards de distribuição de respostas ---- */
  const qCards=QUIZ_QS.map(q=>{
    const saw=uViews(q.step), dist=quizDist(q.step);
    const tot=Object.values(dist).reduce((a,b)=>a+b,0);
    const t=quizMs(q.step);
    return `<div class="card"><h2>${q.emoji} Pergunta ${q.step} <span class="badge">${fmt(tot)} respostas</span></h2>
      <div style="font-size:12.5px;color:var(--muted);margin:-6px 0 14px;line-height:1.4">${esc(q.q)} · viram ${fmt(saw)} · responderam ${pct(tot,saw)}%${t.n?' · tempo mediano '+fmtSec(t.med):''}</div>
      ${ansBars(dist)}</div>`;
  }).join('');

  return `<div class="kpis" style="margin-bottom:16px">${kpis}</div>
  <div class="card"><h2>🪜 Retenção pergunta a pergunta <span class="badge">sessões únicas no período</span></h2>
    <div style="overflow-x:auto"><div style="min-width:700px">${ladderHead}${ladderRows}</div></div>
    <div class="note">Viram = view da tela · Avançaram = resposta (no diagnóstico, clique no CTA) · Taxa = avançaram ÷ viram · Retenção = vs etapa anterior.

      <div class="tbl-wrap"><table style="min-width:440px">
        <thead><tr><th>Dia</th><th style="text-align:right">Visitantes</th><th style="text-align:right">Começaram</th><th style="text-align:right">Início</th><th style="text-align:right">Concluíram</th><th style="text-align:right">Conclusão</th></tr></thead>
        <tbody>${dayRows}</tbody></table></div>
      ${chart}
    </div>
    <div class="card"><h2>⏱️ Tempo mediano por etapa</h2>
      <div class="tbl-wrap"><table style="min-width:380px">
        <thead><tr><th>Etapa</th><th style="text-align:right">Mediana</th><th style="text-align:right">Amostra</th></tr></thead>
        <tbody>${timeRows}</tbody></table></div>
      <div class="note">Tempo por pergunta, clique de início na landing e CTA do diagnóstico são coletados desde 03/07/2026 — eventos antigos não têm esse dado ("—" = ainda sem amostra).</div>

    <div class="tbl-wrap"><table style="min-width:440px">

      <tbody>${devRows}</tbody></table></div></div>

/* ====================== EVENTOS (log + filtros + payload) ====================== */
function evOrigin(e){ return e.utm_source || (e.ref? (''+e.ref).replace(/^https?:\/\//,'').split('/')[0] : 'direto'); }
function eventosFiltered(){
  let list;
  if(evSession){
    list = _ev.filter(e=>e.s===evSession).sort((a,b)=>a.t-b.t); // jornada em ordem cronológica
  }else{
    list = liveEv().slice().sort((a,b)=>b.t-a.t);
    if(evType) list=list.filter(e=>e.ev===evType);
    if(evCamp) list=list.filter(e=>e.utm_campaign===evCamp);
    if(evQuery){
      const q=evQuery.toLowerCase();
      list=list.filter(e=>(e.s||'').toLowerCase().includes(q)||(e.name||'').toLowerCase().includes(q)||(e.ans||'').toLowerCase().includes(q));
    }
  }
  return list;
}

  return `<div class="card">

      <select class="flt" id="evC"><option value="">Todas as campanhas</option>${camps.map(c=>`<option ${c===evCamp?'selected':''}>${esc(c)}</option>`).join('')}</select>
      <button class="btn-soft" onclick="exportCSV()">⬇️ CSV</button>

      <button onclick="evPage=Math.max(1,evPage-1);renderTab()">‹</button>
      <span>${evPage} / ${pages} · ${fmt(list.length)} eventos</span>
      <button onclick="evPage=Math.min(${pages},evPage+1);renderTab()">›</button>

function bindEventosUI(){
  const q=$('#evQ'), t=$('#evT'), c=$('#evC');
  if(q) q.addEventListener('input',()=>{ evQuery=q.value; evPage=1; refreshEvTableOnly(); });
  if(t) t.addEventListener('change',()=>{ evType=t.value; evPage=1; renderTab(); });
  if(c) c.addEventListener('change',()=>{ evCamp=c.value; evPage=1; renderTab(); });
  const tb=$('#evTable');
  if(tb) tb.addEventListener('click',ev=>{
    const tr=ev.target.closest('tr.expandable'); if(!tr) return;
    const next=tr.nextElementSibling;
    if(next&&next.classList.contains('payload-row')){ next.remove(); return; }
    document.querySelectorAll('tr.payload-row').forEach(r=>r.remove());
    const gi=Number(tr.dataset.idx);
    const e=eventosFiltered()[gi]; if(!e) return;
    const pr=document.createElement('tr'); pr.className='payload-row';
    pr.innerHTML='<td colspan="8"><pre>'+esc(JSON.stringify(e,null,2))+'</pre></td>';
    tr.after(pr);
  });
}

  const html=tabEventos();

/* ====================== RESUMO (KPIs + comparação + A/B) ====================== */
function countBy(arr,keyFn){ const m={}; arr.forEach(x=>{const k=keyFn(x)||'—'; m[k]=(m[k]||0)+1;}); return m; }
function uCountBy(keyFn,pred){
  const seen={};
  liveEv().forEach(e=>{ if(pred&&!pred(e))return; const k=keyFn(e)||'—'; (seen[k]=seen[k]||new Set()); if(e.s)seen[k].add(e.s); });
  const m={}; Object.keys(seen).forEach(k=>m[k]=seen[k].size); return m;
}
function barGroup(obj,limit){
  const ent=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,limit||8);
  const max=Math.max(1,...ent.map(e=>e[1]));
  if(!ent.length) return '<div class="empty">Sem dados.</div>';
  return '<div class="barGroup">'+ent.map(([k,v])=>`<div class="bg-row">
    <div class="bg-name" title="${esc(k)}">${esc(k)}</div>
    <div class="bg-track"><div class="bg-fill" style="width:${v/max*100}%"></div></div>
    <div class="bg-val">${fmt(v)}</div></div>`).join('')+'</div>';
}
/* teste A/B de preço com significância */
function priceAbCard(){
  return '';   // sem teste A/B de preço neste funil (preço único R$29,90)
  const labels={A:'A · R$ 27,90 (atual)', B:'B · R$ 34,90'};
  const vis = uCountBy(e=>e.price_ab, e=>!!e.price_ab);
  const chk = uCountBy(e=>e.price_ab, e=>e.ev==='checkout_click'&&e.price_ab);
  const buys={}, rev={};
  _vendas.filter(v=>APPROVED.test(v.status)).forEach(v=>{ const k=v.ab; if(k==='A'||k==='B'){ buys[k]=(buys[k]||0)+1; rev[k]=(rev[k]||0)+vValor(v); } });
  const variants=['A','B'];
  const totalVis = variants.reduce((a,k)=>a+(vis[k]||0),0);
  const totalBuys= variants.reduce((a,k)=>a+(buys[k]||0),0);
  if(!totalVis && !totalBuys){
    return `<div class="card"><h2>🧪 Teste A/B de Preço</h2><div class="empty">Ainda sem dados. Assim que o tráfego novo entrar, os acessos e as compras por variante aparecem aqui.</div></div>`;
  }
  const rows = variants.map(k=>{
    const a=vis[k]||0, cl=chk[k]||0, c=buys[k]||0, conv=a>0?(c/a*100):0;
    return `<tr style="border-top:1px solid var(--line)">
      <td style="padding:9px 6px;font-weight:700">${labels[k]}</td>
      <td style="padding:9px 6px;text-align:right">${fmt(a)}</td>
      <td style="padding:9px 6px;text-align:right">${fmt(cl)}</td>
      <td style="padding:9px 6px;text-align:right;font-weight:700">${fmt(c)}</td>
      <td style="padding:9px 6px;text-align:right;color:var(--primary);font-weight:700">${conv.toFixed(1).replace('.',',')}%</td>
      <td style="padding:9px 6px;text-align:right">${fmtMoney(rev[k]||0)}</td>
    </tr>`;
  }).join('');
  // significância (duas proporções: compras/acessos)
  let sig='';
  const nA=vis.A||0, nB=vis.B||0, cA=buys.A||0, cB=buys.B||0;
  if(cA<AB_MIN_BUYS||cB<AB_MIN_BUYS){
    sig=`<div class="sig small">⏳ Amostra ainda pequena — colete pelo menos ${AB_MIN_BUYS} compras por variante antes de decidir (A: ${cA} · B: ${cB}).</div>`;
  }else if(nA>0&&nB>0){
    const p1=cA/nA, p2=cB/nB, p=(cA+cB)/(nA+nB);
    const se=Math.sqrt(p*(1-p)*(1/nA+1/nB));
    const z=se>0?Math.abs(p1-p2)/se:0;
    const winner = (rev.B||0)/(nB||1) > (rev.A||0)/(nA||1) ? 'B' : 'A';
    if(z>=1.96) sig=`<div class="sig ok">✅ Diferença significativa (95%) — variante <b>${winner}</b> gera mais receita por visitante (z=${z.toFixed(2)}).</div>`;
    else sig=`<div class="sig ns">📊 Ainda sem significância estatística (z=${z.toFixed(2)} &lt; 1,96) — continue o teste.</div>`;
  }
  return `<div class="card"><h2>🧪 Teste A/B de Preço <span class="badge">A: R$ 27,90 · B: R$ 34,90</span></h2>
    <table style="width:100%;border-collapse:collapse;font-size:13.5px">
      <thead><tr style="color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em">
        <th style="text-align:left;padding:0 6px 6px">Variante</th>
        <th style="text-align:right;padding:0 6px 6px">Acessos</th>
        <th style="text-align:right;padding:0 6px 6px">Checkout</th>
        <th style="text-align:right;padding:0 6px 6px">Compras</th>
        <th style="text-align:right;padding:0 6px 6px">Conversão</th>
        <th style="text-align:right;padding:0 6px 6px">Receita</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${sig}
    <div class="note">Acessos = visitantes únicos por variante · Compras = vendas aprovadas com <code>ab</code> (postback Payt). Significância via teste z de duas proporções (compras/acessos).</div>
  </div>`;
}

    <div class="card"><h2>🏆 Ranking de campanhas <span class="badge">por cliques no checkout</span></h2>
      <div class="tbl-wrap"><table style="min-width:520px">
        <thead><tr><th>Campanha (utm_campaign)</th><th style="text-align:right">Sessões</th><th style="text-align:right">Checkouts</th><th style="text-align:right">Taxa</th></tr></thead>
        <tbody>${rankRows}</tbody></table></div>
      <div class="note">⚠️ O postback do checkout normalmente não carrega a sessão/UTM, então a venda não é atribuível à campanha por aqui — use os cliques de checkout como proxy e a atribuição de vendas na sua ferramenta de tracking (ex.: Utmify). Gasto/ROAS do Meta Ads fica fora deste painel (sem API do Gerenciador).</div>
    </div>
    <div class="grid2">
      <div class="card"><h2>📡 utm_source</h2>${barGroup(src)}</div>
      <div class="card"><h2>📣 utm_campaign</h2>${barGroup(camp)}</div>
    </div>
    <div class="grid2">
      <div class="card"><h2>🖼️ utm_content (anúncio)</h2>${barGroup(cont)}</div>
      <div class="card"><h2>🎛️ utm_adset (conjunto)</h2>${barGroup(adset)}</div>
    </div>
    <div class="grid2">
      <div class="card"><h2>📱 Dispositivo</h2>${barGroup(dev)}</div>
      <div class="card"><h2>🧭 Navegador / SO</h2>${barGroup(Object.assign({},brw,
        Object.fromEntries(Object.entries(os).map(([k,v])=>['SO: '+k,v]))))}</div>
    </div>`;
}

/* ====================== VENDAS (status + produto) ====================== */
function tabVendas(){
  const all=_vendas;
  const stCount = {all:all.length, aprovada:0, pendente:0, recusada:0, reembolsada:0, outro:0};
  all.forEach(v=>{ stCount[vendaStatus(v)]++; });
  let list = all.filter(v=> vStatus==='all' ? true : vendaStatus(v)===vStatus);
  if(vProd!=='all') list=list.filter(v=> (v.produto||'') === (vProd==='antigo'?'':vProd));
  const appr=list.filter(x=>APPROVED.test(x.status));
  const rev=appr.reduce((a,x)=>a+vValor(x),0);
  const stChip=(k,lbl)=>`<button class="chip ${vStatus===k?'on':''}" onclick="vStatus='${k}';renderTab()">${lbl} (${fmt(stCount[k]||0)})</button>`;
  const prods=[['all','Todos'],['curso','Curso'],['biblioteca','Biblioteca'],['reconstrucao','Reconstrução'],['manual-comunicacao','Manual'],['antigo','(antigas s/ produto)']];
  const prodChip=([k,lbl])=>`<button class="chip ${vProd===k?'on':''}" onclick="vProd='${k}';renderTab()">${lbl}</button>`;
  const stBadge=v=>{
    const s=vendaStatus(v);
    const map={aprovada:['ap','✅ aprovada'],pendente:['pe','⏳ '+(/expir/i.test(v.status)?'expirada':'pendente')],recusada:['re','✕ recusada'],reembolsada:['rf','↩ reembolso'],outro:['ou',esc(v.status||'—')]};
    const [c,l]=map[s]; return `<span class="badge-st ${c}">${l}</span>`;
  };
  let rows=list.slice().sort((a,b)=>b.t-a.t).slice(0,300).map(x=>`<tr>
    <td class="fix">${x.t?new Date(x.t).toLocaleString('pt-BR'):'—'}</td>
    <td>${stBadge(x)}</td>
    <td>${esc(PRODUTOS[x.produto]||x.produto||'— antiga')}</td>
    <td>${esc(x.metodo||'—')}</td>
    <td>${fmtMoney(vValor(x))}</td>
    <td>${x.ab?('<b>'+esc(x.ab)+'</b>'):'—'}</td>
    <td>${esc(x.nome||'—')}</td>
    <td>${esc(x.email||'—')}</td>
    <td>${esc(x.order_id||'—')}</td></tr>`).join('');
  if(!list.length) rows=`<tr><td colspan="9"><div class="empty">Nenhuma venda com esses filtros.</div></td></tr>`;
  return `<div class="card"><h2>💰 Vendas <span class="badge">via postback do checkout</span></h2>
    <div class="row-actions">${stChip('all','Todas')}${stChip('aprovada','Aprovadas')}${stChip('pendente','Pendentes/Pix')}${stChip('recusada','Recusadas')}${stChip('reembolsada','Reembolsadas')}</div>
    <div class="row-actions"><span style="font-size:12px;color:var(--muted)">Produto:</span>${prods.map(prodChip).join('')}</div>
    <div class="mini-kpis">
      <div class="mini-kpi"><div class="n">${fmtMoney(rev)}</div><div class="l">Receita aprovada (filtro)</div></div>
      <div class="mini-kpi"><div class="n">${fmt(appr.length)}</div><div class="l">Aprovadas (filtro)</div></div>
      <div class="mini-kpi"><div class="n">${fmt(appr.filter(x=>/pix/i.test(x.metodo)).length)}</div><div class="l">Pix</div></div>
      <div class="mini-kpi"><div class="n">${fmt(appr.filter(x=>/cart|credit|card/i.test(x.metodo)).length)}</div><div class="l">Cartão</div></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th class="fix">Quando</th><th>Status</th><th>Produto</th><th>Método</th><th>Valor</th><th>A/B</th><th>Nome</th><th>Email</th><th>Pedido</th></tr></thead>
      <tbody>${rows}</tbody></table></div>
    <div class="note">Vendas chegam pelo postback do checkout (server-side) e normalmente não carregam sessão/UTM — a jornada individual não é linkável à venda.</div></div>`;
}

/* ====================== HORÁRIOS (quando mais vende) ====================== */
function tabHorarios(){
  const appr = _vendas.filter(v=>APPROVED.test(v.status) && v.t);
  if(!appr.length){
    return `<div class="card"><h2>🕐 Horários que mais venderam</h2>
      <div class="empty">Sem vendas aprovadas no período selecionado.<br>Ajuste o filtro de período no topo (ex.: "Tudo").</div></div>`;
  }
  const DIAS = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const DIAS_C = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const hCount=new Array(24).fill(0), hRev=new Array(24).fill(0);
  const dCount=new Array(7).fill(0),  dRev=new Array(7).fill(0);
  const heat={}; let maxCell=0;
  appr.forEach(v=>{
    const dt=new Date(v.t), h=dt.getHours(), d=dt.getDay(), val=vValor(v);
    hCount[h]++; hRev[h]+=val; dCount[d]++; dRev[d]+=val;
    const k=d+'_'+h; heat[k]=(heat[k]||0)+1; if(heat[k]>maxCell) maxCell=heat[k];
  });
  const argmax=arr=>{let mi=0; for(let i=1;i<arr.length;i++) if(arr[i]>arr[mi]) mi=i; return mi;};
  const bestH=argmax(hCount), bestD=argmax(dCount);

  // faixas do dia
  const FAIXAS=[['🌙 Madrugada','00h–06h',0,5],['🌅 Manhã','06h–12h',6,11],['☀️ Tarde','12h–18h',12,17],['🌆 Noite','18h–00h',18,23]];
  const faixa=FAIXAS.map(f=>{let c=0,r=0; for(let h=f[2];h<=f[3];h++){c+=hCount[h];r+=hRev[h];} return {nome:f[0],faixa:f[1],c,r};});
  const bestFaixa=faixa.reduce((a,b)=>b.c>a.c?b:a,faixa[0]);

  const maxH=Math.max(1,...hCount), maxD=Math.max(1,...dCount), maxF=Math.max(1,...faixa.map(f=>f.c));
  const barRow=(label,count,rev,max,hot)=>`<div class="bg-row" style="grid-template-columns:66px 1fr 150px">
    <div class="bg-name"${hot?' style="color:var(--primary);font-weight:800"':''}>${label}</div>
    <div class="bg-track"><div class="bg-fill" style="width:${count/max*100}%${hot?';background:linear-gradient(90deg,var(--primary),var(--primary-d,#b02a63))':''}"></div></div>
    <div class="bg-val">${count} · ${fmtMoney(rev)}</div></div>`;

  const horas=Array.from({length:24},(_,h)=>barRow(String(h).padStart(2,'0')+'h', hCount[h], hRev[h], maxH, h===bestH)).join('');
  const dias =DIAS.map((d,i)=>barRow(d, dCount[i], dRev[i], maxD, i===bestD)).join('');
  const faixas=faixa.map(f=>barRow(f.nome.replace(/^\S+\s/,''), f.c, f.r, maxF, f===bestFaixa)).join('');

  // heatmap dia × hora
  const H=Array.from({length:24},(_,h)=>h);
  const head=`<div style="display:grid;grid-template-columns:38px repeat(24,1fr);gap:2px;margin-bottom:3px">
    <div></div>${H.map(h=>`<div style="font-size:8px;color:var(--muted);text-align:center">${h%3===0?h:''}</div>`).join('')}</div>`;
  const rowsHeat=DIAS_C.map((d,di)=>`<div style="display:grid;grid-template-columns:38px repeat(24,1fr);gap:2px;margin-bottom:2px;align-items:center">
    <div style="font-size:10px;color:var(--muted)">${d}</div>
    ${H.map(h=>{const c=heat[di+'_'+h]||0; return `<div title="${DIAS[di]} ${String(h).padStart(2,'0')}h · ${c} venda(s)" style="height:15px;border-radius:3px;background:var(--primary);opacity:${c?(0.16+0.84*c/maxCell).toFixed(2):0.05}"></div>`;}).join('')}</div>`).join('');

  return `<div class="card"><h2>🕐 Horários que mais venderam <span class="badge">${fmt(appr.length)} vendas aprovadas no período</span></h2>
    <div class="mini-kpis">
      <div class="mini-kpi"><div class="n">${String(bestH).padStart(2,'0')}h–${String((bestH+1)%24).padStart(2,'0')}h</div><div class="l">⏰ Melhor hora · ${hCount[bestH]} vendas</div></div>
      <div class="mini-kpi"><div class="n">${DIAS[bestD]}</div><div class="l">📅 Melhor dia · ${dCount[bestD]} vendas</div></div>
      <div class="mini-kpi"><div class="n">${bestFaixa.nome.split(' ')[1]||bestFaixa.nome}</div><div class="l">${bestFaixa.faixa} · ${bestFaixa.c} vendas</div></div>
      <div class="mini-kpi"><div class="n">${fmtMoney(hRev[bestH])}</div><div class="l">💰 Receita na melhor hora</div></div>
    </div>
    <div class="note" style="margin-bottom:14px">Baseado nas <b>vendas aprovadas</b> do período selecionado no topo. Horário no fuso local de quem abre o painel.</div>
    <div class="grid2">
      <div><h3 style="font-size:13px;margin-bottom:10px">Por hora do dia</h3><div class="barGroup">${horas}</div></div>
      <div>
        <h3 style="font-size:13px;margin-bottom:10px">Por dia da semana</h3><div class="barGroup">${dias}</div>
        <h3 style="font-size:13px;margin:18px 0 10px">Por faixa do dia</h3><div class="barGroup">${faixas}</div>
      </div>
    </div>
    <h3 style="font-size:13px;margin:20px 0 10px">Mapa de calor · dia × hora <span class="badge">mais escuro = mais vendas</span></h3>
    <div style="overflow-x:auto"><div style="min-width:600px">${head}${rowsHeat}</div></div>
  </div>`;
}

/* ====================== META CAPI ====================== */
function tabCapi(){
  const l=_capiLog;
  const okN=l.filter(c=>c.status_code===200).length;
  const rate=l.length?Math.round(okN/l.length*100):0;
  // por tipo de evento: enviados ok / erro
  const types={};
  l.forEach(c=>{ const k=c.ev||'—'; types[k]=types[k]||{ok:0,err:0}; c.status_code===200?types[k].ok++:types[k].err++; });
  const typeRows=Object.entries(types).sort((a,b)=>(b[1].ok+b[1].err)-(a[1].ok+a[1].err)).map(([k,v])=>`<tr>
    <td>${esc(k)}</td>
    <td style="text-align:right;color:var(--accent-d);font-weight:700">${fmt(v.ok)}</td>
    <td style="text-align:right;color:${v.err?'var(--danger)':'var(--muted)'};font-weight:700">${fmt(v.err)}</td>
    <td style="text-align:right">${pct(v.ok,v.ok+v.err)}%</td></tr>`).join('')
    || '<tr><td colspan="4"><div class="empty">Nenhum envio.</div></td></tr>';
  // últimos erros
  const errs=l.filter(c=>c.status_code!==200).sort((a,b)=>b.t-a.t).slice(0,10);
  const errRows=errs.map(c=>`<tr>
    <td class="fix">${c.t?new Date(c.t).toLocaleString('pt-BR'):'—'}</td>
    <td>${esc(c.ev||'—')}</td>
    <td><span class="badge-ev checkout">${c.status_code||'erro'}</span></td>
    <td style="max-width:420px;white-space:normal;color:var(--muted);font-size:11.5px">${esc((c.response||'').slice(0,300))}</td></tr>`).join('')
    || '<tr><td colspan="4"><div class="empty">Nenhum erro registrado 🎉</div></td></tr>';
  // dedup: nossos eventos do navegador têm event_id (Pixel usa o mesmo id)
  const evWithId = liveEv().filter(e=>e.event_id).length;
  const evTotal  = liveEv().length;
  let rows=l.slice().sort((a,b)=>b.t-a.t).slice(0,80).map(c=>`<tr>
    <td class="fix">${c.t?new Date(c.t).toLocaleString('pt-BR'):'—'}</td>
    <td>${esc(c.ev||'—')}</td>
    <td>${c.status_code===200?'<span class="badge-ev answer">200</span>':'<span class="badge-ev checkout">'+(c.status_code||'erro')+'</span>'}</td>
    <td style="max-width:340px;white-space:normal;color:var(--muted)">${esc((c.response||'').slice(0,160))}</td></tr>`).join('');
  if(!l.length) rows=`<tr><td colspan="4"><div class="empty">Nenhum envio CAPI registrado.</div></td></tr>`;
  return `<div class="card"><h2>⚡ Meta Conversions API</h2>
    <div class="mini-kpis">
      <div class="mini-kpi"><div class="n">${fmt(l.length)}</div><div class="l">Total enviado</div></div>
      <div class="mini-kpi"><div class="n">${rate}%</div><div class="l">Taxa de sucesso</div></div>
      <div class="mini-kpi"><div class="n">${fmt(okN)}</div><div class="l">Status 200</div></div>
      <div class="mini-kpi"><div class="n">${fmt(l.length-okN)}</div><div class="l">Com erro</div></div>
    </div>
    <div class="grid2">
      <div class="card" style="background:#f8fafc;margin-bottom:0"><h2 style="font-size:13px">Enviados × erros por tipo de evento</h2>
        <div class="tbl-wrap"><table style="min-width:380px">
          <thead><tr><th>Evento</th><th style="text-align:right">OK</th><th style="text-align:right">Erros</th><th style="text-align:right">Sucesso</th></tr></thead>
          <tbody>${typeRows}</tbody></table></div>
      </div>
      <div class="card" style="background:#f8fafc;margin-bottom:0"><h2 style="font-size:13px">Deduplicação (Pixel × CAPI)</h2>
        <div class="mini-kpis" style="grid-template-columns:1fr 1fr;margin-bottom:8px">
          <div class="mini-kpi"><div class="n">${pct(evWithId,evTotal)}%</div><div class="l">eventos c/ event_id</div></div>
          <div class="mini-kpi"><div class="n">${fmt(evWithId)}</div><div class="l">de ${fmt(evTotal)} eventos</div></div>
        </div>
        <div class="note">A CAPI é opcional: só envia se você preencher <code>PIXEL_ID</code> e <code>CAPI_TOKEN</code> no GAS. O mesmo <code>event_id</code> é enviado no Pixel (navegador) e no CAPI (servidor) — o Meta deduplica por ele. A taxa de correspondência (match quality) só aparece no Gerenciador de Eventos do Meta.</div>
      </div>
    </div>
    <div style="height:14px"></div>
    <div class="card" style="margin-bottom:14px"><h2 style="font-size:13px">🚨 Últimos erros (payload da resposta)</h2>
      <div class="tbl-wrap"><table>
        <thead><tr><th class="fix">Quando</th><th>Evento</th><th>Status</th><th>Resposta do Meta</th></tr></thead>
        <tbody>${errRows}</tbody></table></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th class="fix">Quando</th><th>Evento</th><th>Status</th><th>Resposta</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div>`;
}

/* ====================== CSV / RESET ====================== */
function exportCSV(){
  const cols=['t','s','ev','step','name','gender','ans','ms','origin','device','browser','os','utm_source','utm_medium','utm_campaign','utm_content','utm_adset','price_ab','ref'];
  const head=cols.join(',');
  const body=liveEv().map(e=>{
    const o=Object.assign({},e,{origin:evOrigin(e), t:e.t?new Date(e.t).toISOString():''});
    return cols.map(c=>`"${String(o[c]??'').replace(/"/g,'""')}"`).join(',');
  }).join('\n');
  const blob=new Blob([head+'\n'+body],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='eventos_'+(period.mode||'todos')+'.csv'; a.click();
  toast('✓ CSV exportado');
}
async function resetData(){
  if(!confirm('Isso vai APAGAR todos os dados de eventos (no GAS e local). Continuar?')) return;
  if(!confirm('Tem certeza absoluta? Esta ação não pode ser desfeita.')) return;
  try{
    if(GAS && !/COLE_AQUI/.test(GAS)){
      await fetch(GAS,{method:'POST',body:JSON.stringify({action:'reset'})}).catch(()=>{});
    }
  }catch(e){}
  localStorage.removeItem(KEY); localStorage.removeItem(CKEY);
  _evAll=[];_vendasAll=[];_capiLogAll=[]; applyFilter(); renderAll();
  toast('🗑️ Dados resetados');
}

/* ====================== TOAST ====================== */
let toastT;
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600);
}
